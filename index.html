<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Iintoo Registration</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="wrapper">
      <div class="left">
        <img src="/assets/bg.jpg" class="bg" alt="" />
        <img src="/assets/logo.svg" class="logo" alt="logo" />
      </div>

      <div class="right">
        <div class="form-container">
          <h1>Get iintoo it today</h1>

          <p class="subtitle">
            There is no charge or obligation upon registration.
          </p>

          <div class="social">
            <button class="fb">
              <img src="/assets/facebook.svg" />
              Register with Facebook
            </button>

            <button class="linkedin">
              <img src="/assets/linkedin.svg" />
              Register with LinkedIn
            </button>
          </div>

          <div class="divider">
            <span>OR</span>
          </div>

          <div class="inputs">
            <div class="input-group">
              <label>Email</label>
              <input type="email" />
            </div>

            <div class="input-group">
              <label>Phone</label>
              <input type="tel" />
            </div>
          </div>

          <h2>What type of investor are you?</h2>

          <p class="subtitle2">Select the type of investor you are below.</p>

          <div class="radio-group">
            <label class="radio-item">
              <input type="radio" name="type" />
              Individual

              <span class="info">
                i

                <span class="tooltip">
                  I am a natural person investing on my own behalf, as a sole
                  owner, joint tenant, or tenant in common.
                </span>
              </span>
            </label>

            <label class="radio-item">
              <input type="radio" name="type" />
              Business

              <span class="info">
                i

                <span class="tooltip">
                  I am a natural person investing on my own behalf, as a sole
                  owner, joint tenant, or tenant in common.
                </span>
              </span>
            </label>

            <label class="radio-item">
              <input type="radio" name="type" />
              IRA

              <span class="info">
                i

                <span class="tooltip">
                  I am a natural person investing on my own behalf, as a sole
                  owner, joint tenant, or tenant in common.
                </span>
              </span>
            </label>

            <label class="radio-item">
              <input type="radio" name="type" />
              Trust

              <span class="info">
                i

                <span class="tooltip">
                  I am a natural person investing on my own behalf, as a sole
                  owner, joint tenant, or tenant in common.
                </span>
              </span>
            </label>
          </div>

          <div class="terms">
            <label>
              <input type="checkbox" />

              I agree to the terms and conditions,
              <a href="#" class="terms-link">view full terms</a>
            </label>
          </div>

          <button class="create">Create Account</button>
        </div>
      </div>
    </div>
  </body>
</html>
